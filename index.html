<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Infinity Calendar</title>
    <style>
     :root {
    --bg-black: #000000;
    --sidebar-gray: #3d3d3d;
    --row-light: #e1fbc4;
    --row-dark: #c9efaa;
    --today-yellow: #00cc44;
    --text-main: #1b5e20;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(46, 125, 50, 0.7);
}

[data-theme="blue"] {
    --sidebar-gray: #2c3e50;
    --row-light: #e3f2fd;
    --row-dark: #bbdefb;
    --today-yellow: #ffff00;
    --text-main: #0d47a1;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(13, 71, 161, 0.7);
}

[data-theme="bw"] {
    --sidebar-gray: #f5f5f5 !important; 
    --row-light: #ffffff !important; 
    --row-dark: #fcfcfc !important; 
--today-yellow: #999999 !important;  
    --text-event: #000000 !important;  
    --text-main: #000000 !important; 
    --text-sidebar: #000000 !important; 
    --bg-button: rgba(0, 0, 0, 0.7);
}


[data-theme="red"] {
    --sidebar-gray: #4a1414;
    --row-light: #ffebee;
    --row-dark: #ffcdd2;
    --today-yellow: #ff9d00;
    --text-main: #b71c1c;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(183, 28, 28, 0.7);
}

[data-theme="gray"] {
    --sidebar-gray: #212121;
    --row-light: #f5f5f5;
    --row-dark: #e0e0e0;
    --today-yellow: #ffaaaa;
    --text-main: #424242;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(66, 66, 66, 0.7);
}

[data-theme="yellow"] {
    --sidebar-gray: #fbc02d;
    --row-light: #fffde7;
    --row-dark: #fff9c4;
    --today-yellow: #00e5ff; /* Cyan sticht auf Gelb hervor */
    --text-main: #f57f17;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(251, 192, 45, 0.8);
}

[data-theme="orange"] {
    --sidebar-gray: #e65100;
    --row-light: #fff3e0;
    --row-dark: #ffe0b2;
    --today-yellow: #00e5ff;
    --text-main: #e65100;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(230, 81, 0, 0.8);
}

[data-theme="pink"] {
    --sidebar-gray: #880e4f;
    --row-light: #fce4ec;
    --row-dark: #f8bbd0;
    --today-yellow: #ff1493;
    --text-main: #ad1457;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(136, 14, 79, 0.8);
}

[data-theme="purple"] {
    --sidebar-gray: #4a148c;
    --row-light: #f3e5f5;
    --row-dark: #e1bee7;
    --today-yellow: #76ff03;
    --text-main: #6a1b9a;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(74, 20, 140, 0.8);
}

[data-theme="turquoise"] {
    --sidebar-gray: #006064;
    --row-light: #e0f2f1;
    --row-dark: #b2dfdb;
    --today-yellow: #ff4081; /* Pink sticht auf Türkis hervor */
    --text-main: #00695c;
    --text-event: #000000;
    --text-sidebar: #ffffff;
    --bg-button: rgba(0, 96, 100, 0.8);
}

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg-black);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

.calendar-scroll {
    height: 100vh; /* Fallback */
/* Garantiert volle Höhe ohne schwarzen Balken oben */
        height: 100dvh !important;
overflow-y: auto !important;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 80px; /* Wichtig, damit man bis ganz unten scrollen kann */
/* Entfernt den Abstand oben im Querformat */
    padding-top: 0 !important;
    margin-top: 0 !important;
}

        .month-section {
            display: flex;
            background: var(--bg-black);
            border-bottom: 6px solid var(--bg-black);
        }

        .month-rail {
            width: 45px;
            background: var(--sidebar-gray);
            flex-shrink: 0;
            position: relative;
        }

.sticky-wrapper {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    /* Wir nutzen 100vh, damit der Wrapper den gesamten Sichtbereich abdeckt */
    height: 100vh; 
    height: 100dvh; 
    display: flex;
    /* Zentriert den Text vertikal im sichtbaren Bereich */
    align-items: center; 
    justify-content: center;
    box-sizing: border-box;
}

        .month-label {
            color: var(--text-sidebar) !important;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .days-container { flex: 1; background: var(--bg-black); }

        .week-separator {
            height: 5px;
background: var(--sidebar-gray);
            width: 100%;
        }

        .day-row {
            display: flex;
            min-height: 50px;
            padding: 5px 5px;
            box-sizing: border-box;
            background: var(--row-light);
            align-items: flex-start;
        }

        .day-row:nth-child(even) { background: var(--row-dark); }
        .day-row.today { background: var(--today-yellow) !important; }

        .date-col { 
            width: 80px; 
            color: var(--text-main); 
            flex-shrink: 0; 
            display: flex; 
            align-items: baseline; 
            gap: 5px;
        }
        
        .date-number, .date-day { 
            font-weight: 400; 
            font-size: 0.8rem; 
            line-height: 1.4; 
        }

        /* Styling für Samstag und Sonntag (Zahl und Text) */
        .we .date-number, .we .date-day { 
            font-style: italic; 
            opacity: 0.45; 
        }

        .event-col { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            justify-content: flex-start;
        }
        
        .event-item { 
color: var(--text-event);
            cursor: pointer; 
            line-height: 1.4;
            font-size: 0.8rem;
            font-weight: 700;
            word-break: break-word;
        }

        .f-btn {
    position: fixed; 
    width: 65px; 
    height: 65px; 
    border-radius: 50%; /* Hier von 22px auf 50% ändern */
background: var(--bg-button) !important;
    color: white; 
    border: none;
    font-weight: bold; 
    z-index: 100; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
/* Sorgt dafür, dass alles hinter dem Button leicht verschwimmt (Edel-Look) */
    backdrop-filter: blur(4px); 
    -webkit-backdrop-filter: blur(4px);
}
        .b-today { bottom: 25px; left: 20px; }
        .b-back { bottom: 25px; right: 20px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        /* Fix für die Datums-Zeile im Pop-up */
.m-box > div[style*="display:flex"] {
    flex-direction: column !important; /* Stapelt Start und Ende untereinander */
    gap: 15px !important;
}

/* Verhindert, dass Datum und Zeit in einer Zeile gequetscht werden */
#m-time-start-wrap, #m-time-end-wrap {
    margin-top: 5px;
}

/* Alle Felder exakt gleich breit und kompakt */
.m-box input[type="text"],
.m-box input[type="date"],
.m-box input[type="time"],
.m-box select {
    width: 100% !important;
    /* Verhindert, dass die Boxen wegen Padding unterschiedlich breit werden */
    box-sizing: border-box !important; 
    /* Reduziert die Höhe auf ein normales Maß */
    height: 40px !important; 
    padding: 5px 10px !important;
    margin: 5px 0 !important;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #ffffff;
    font-size: 16px;
    display: block;
    /* Entfernt spezielle iPhone-Stylings, die Boxen verzerren */
    appearance: none;
    -webkit-appearance: none;
}

/* Spezieller Fix für das Select-Feld (Wiederholung), damit es nicht höher ist */
.m-box select {
    background-image: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D"http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg"%20width%3D"292.4"%20height%3D"292.4"><path%20fill%3D"%23666"%20d%3D"M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z"%2F><%2Fsvg>');
    background-repeat: no-repeat;
    background-position: right 10px top 50%;
    background-size: 12px auto;
    padding-right: 30px !important;
}


/* Macht die Titel "Neu", "Termin" und "Backup" weiß */
.m-box h3 {
    color: #ffffff; 
    margin-top: 0;
}
        .btn-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .btn-grid button { height: 48px; flex: 1 1 45%; border: none; border-radius: 12px; font-weight: bold; font-size: 0.95rem; }
        .btn-grid .full { flex: 1 1 100% !important; }
        .btn-gray { background: #f2f2f2; color: #444; }
        .btn-red { background: #ffebee; color: #c62828; }
        .btn-green { background: #2e7d32; color: white; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; 
            border: 1px solid #ddd; background: #fff; box-sizing: border-box; font-size: 1rem; 
        }
        
        .check-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
            padding: 5px 0;
            cursor: pointer;
        }
        .check-row input { width: 22px; height: 22px; margin: 0; cursor: pointer; }
        .check-row span { font-size: 1rem; color: #ffffff; font-weight: 500; }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }

@media (prefers-color-scheme: dark) {
    :root {
        --sidebar-gray: #121212;
        --row-light: #1D2619;
        --row-dark: #161D12;
        --today-yellow: #1db94c;
        --text-main: #DCE6D8;
        --text-event: #FFFFFF;
        --text-sidebar: #888888;
        --bg-button: rgba(20, 50, 20, 0.9);
    }

    [data-theme="blue"] {
        --sidebar-gray: #0a0e14;
        --row-light: #0d1b2a;
        --row-dark: #1b263b;
        --today-yellow: #AA8E00;
        --text-main: #e0e1dd;
        --text-event: #FFFFFF;
        --text-sidebar: #778da9;
        --bg-button: rgba(13, 30, 71, 0.9);
    }

    [data-theme="red"] {
        --sidebar-gray: #1a0505;
        --row-light: #2d1616;
        --row-dark: #3d1a1a;
        --today-yellow: #c62828;
        --text-main: #f8d7da;
        --text-event: #FFFFFF;
        --text-sidebar: #a55d5d;
        --bg-button: rgba(71, 13, 13, 0.9);
    }

    [data-theme="bw"] {
        --sidebar-gray: #000000!important;
        --row-light: #111111!important;
        --row-dark: #000000!important;
        --today-yellow: #444444!important;
        --text-main: #ffffff!important;
        --text-event: #ffffff! important;
        --text-sidebar: #ffffff!important;
        --bg-button: rgba(0, 0, 0, 0.9);
    }

    [data-theme="gray"] {
        --sidebar-gray: #050505;
        --row-light: #1a1a1a;
        --row-dark: #2a2a2a;
        --today-yellow: #FF0000; /* Knalliges Cyan sticht auf Dunkelgrau hervor */
        --text-main: #ffffff;
        --text-event: #FFFFFF;
        --text-sidebar: #666666;
        --bg-button: rgba(40, 40, 40, 0.9);
    }

[data-theme="yellow"] { 
        --sidebar-gray: #1a1a00; 
        --row-light: #fff59d; /* Heller lassen für echten Gelb-Look */
        --row-dark: #fdd835; 
        --today-yellow: #00b0ff; 
        --text-main: #000000 !important; /* Text MUSS schwarz sein */
        --text-event: #000000 !important; 
        --text-sidebar: #888800; 
        --bg-button: rgba(253, 216, 53, 0.9); 
    }

    [data-theme="turquoise"] { 
        --sidebar-gray: #001a1a; 
        --row-light: #80cbc4; /* Helleres Türkis */
        --row-dark: #4db6ac; 
        --today-yellow: #ff4081; 
        --text-main: #000000 !important; /* Schwarz für Lesbarkeit */
        --text-event: #000000 !important; 
        --text-sidebar: #008888; 
        --bg-button: rgba(0, 150, 136, 0.9); 
    }

    [data-theme="orange"] { 
        --sidebar-gray: #1a0a00; 
        --row-light: #ffb74d; 
        --row-dark: #ffa726; 
        --today-yellow: #18ffff; 
        --text-main: #000000 !important; 
        --text-event: #000000 !important; 
        --text-sidebar: #884400; 
        --bg-button: rgba(255, 152, 0, 0.9);
    }

 

    [data-theme="pink"] {
        --sidebar-gray: #1a000a;
        --row-light: #2d0014;
        --row-dark: #1a000a;
        --today-yellow: #e0115f;
        --text-main: #f48fb1;
        --text-sidebar: #880044;
        --bg-button: rgba(80, 0, 40, 0.9);
    }

    [data-theme="purple"] {
        --sidebar-gray: #0a001a;
        --row-light: #14002d;
        --row-dark: #0a001a;
        --today-yellow: #107c41;
        --text-main: #ce93d8;
        --text-sidebar: #440088;
        --bg-button: rgba(40, 0, 80, 0.9);
    }

 
}

/* Nur aktiv, wenn das Handy quer liegt */
@media (orientation: landscape) {
    .month-rail {
        /* Erhöht die Breite der grauen Schiene um den Platz der Notch */
        width: calc(45px + env(safe-area-inset-left)) !important;
        /* Schiebt den Inhalt aus dem toten Winkel der Notch */
        padding-left: env(safe-area-inset-left) !important;
    }

    .sticky-wrapper {
        /* Zentriert den Monatsnamen wieder in der nun breiteren Schiene */
        display: flex;
        justify-content: center;
        width: 100%;
    }

    .days-container {
        /* Verhindert, dass die Zeilen rechts unter der Rundung verschwinden */
        padding-right: env(safe-area-inset-right) !important;
    }
}

/* Nur aktiv im Querformat */
@media (orientation: landscape) {
    .m-box {
        /* Nutzt fast die gesamte Höhe, lässt aber oben/unten 5% Platz */
        max-height: 90vh !important; 
        padding: 15px !important; /* Weniger Abstand innen */
        overflow-y: auto !important; /* Macht das Pop-up in sich scrollbar */
    }

    .m-box h3 {
        margin-bottom: 10px !important;
        font-size: 1.2rem !important; /* Titel etwas kleiner */
    }

    /* Macht die Eingabefelder im Querformat flacher */
    .m-box input[type="text"],
    .m-box input[type="date"],
    .m-box input[type="time"],
    .m-box select {
        height: 35px !important; 
        margin: 4px 0 !important;
    }

    /* Die Buttons rücken näher zusammen */
    .m-box button {
        margin-top: 10px !important;
        padding: 10px !important;
    }
}

    </style>
</head>
<body>

<div class="calendar-scroll" id="scroller"></div>

<button onclick="jumpToday()" style="position: fixed; bottom: 30px; left: 25%; transform: translateX(-50%); z-index: 10; cursor: pointer; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); color: #ffffff; border: 0px solid #333333; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; letter-spacing: 0.5px; white-space: nowrap;">
    JETZT
</button>

<button onclick="openSearch()" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; cursor: pointer; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); color: #ffffff; border: 0px solid #333333; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; letter-spacing: 0.5px; white-space: nowrap;">
    SUCHE
</button>

<div id="m-search" class="modal">
    <div class="m-box" style="padding: 20px; border-radius: 16px; background: #1e1e1e; box-shadow: 0 8px 32px rgba(0,0,0,0.5);">
        <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; color: #ffffff; text-align: center;">Termine durchsuchen</h3>
        
        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Suchbegriff</label>
        <input type="text" id="s-input" oninput="runSearch()" placeholder="Suchbegriff eingeben..." style="width: 100%; height: 44px; font-size: 0.9rem; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; margin-bottom: 15px; outline: none;">
        
        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Ergebnisse</label>
        <div id="s-results" style="width: 100%; max-height: 200px; overflow-y: auto; font-size: 0.85rem; color: #ccc; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; margin-bottom: 25px;">
            <p style="color: #666; margin: 0; font-style: italic;">Tippe etwas ein, um zu suchen...</p>
        </div>
        
        <div class="btn-grid">
            <button class="btn-gray full" onclick="document.getElementById('m-search').style.display='none'">Schließen</button>
        </div>
    </div>
</div>

<button onclick="openBackup()" style="position: fixed; bottom: 30px; left: 75%; transform: translateX(-50%); z-index: 10; cursor: pointer; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); color: #ffffff; border: 0px solid #333333; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; letter-spacing: 0.5px; white-space: nowrap;">
    TOOLS
</button>
<div id="m-event" class="modal">
    <div class="m-box" style="padding: 20px; border-radius: 16px; background: #1e1e1e; box-shadow: 0 8px 32px rgba(0,0,0,0.5);">
        <h3 id="m-title" style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; color: #ffffff; text-align: center;">Termin</h3>
        
        <input type="text" id="m-text" placeholder="Titel eingeben" style="width: 100%; height: 44px; font-size: 16px; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 0 12px; box-sizing: border-box; margin-bottom: 15px;">
        
        <div class="check-row" id="toggle-trigger" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: #ffffff; font-size: 1rem;">
            <input type="checkbox" id="m-all" style="width: 20px; height: 20px; accent-color: var(--text-main);">
            <span>Ganztägig</span>
        </div>
        
        <div style="display: flex; gap: 12px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Start</label>
                <input type="date" id="m-start-date" style="width: 100%; height: 44px; font-size: 16px; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 0 10px; box-sizing: border-box; margin-bottom: 6px;">
                <div id="m-time-start-wrap"><input type="time" id="m-time-start" style="width: 100%; height: 44px; font-size: 16px; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 0 10px; box-sizing: border-box;"></div>
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Ende</label>
                <input type="date" id="m-end-date" style="width: 100%; height: 44px; font-size: 16px; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 0 10px; box-sizing: border-box; margin-bottom: 6px;">
                <div id="m-time-end-wrap"><input type="time" id="m-time-end" style="width: 100%; height: 44px; font-size: 16px; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 0 10px; box-sizing: border-box;"></div>
            </div>
        </div>

        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Wiederholung</label>
        <select id="m-rep" style="width: 100%; height: 44px; margin-bottom: 25px; font-size: 16px; background: #2a2a2a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 0 12px; -webkit-appearance: none; appearance: none; cursor: pointer;">
            <option value="none">Einmalig</option>
            <option value="täglich">Täglich</option>
            <option value="wöchentlich">Wöchentlich</option>
            <option value="monatlich">Monatlich</option>
            <option value="jährlich">Jährlich</option>
        </select>
        
        <div class="btn-grid">
            <button class="btn-green" onclick="save()">Speichern</button>
            <button id="m-del" class="btn-red" style="display:none" onclick="showDeleteOptions()">Löschen</button>
            <button class="btn-gray full" onclick="closePop()">Abbrechen</button>
        </div>
    </div>
</div>
<div id="m-del-confirm" class="modal">
    <div class="m-box" style="padding: 24px 20px; border-radius: 16px; background: #1e1e1e; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center;">
        <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 1.3rem; color: #ffffff;">Löschen</h3>
        
        <p style="color: #e0e0e0; font-size: 1rem; margin-top: 0; margin-bottom: 25px; line-height: 1.4;">Serie oder nur diesen Tag?</p>
        
        <div class="btn-grid">
            <button class="btn-red" onclick="delSingle()">Nur diesen</button>
            <button class="btn-red" onclick="delSerie()">Ganze Serie</button>
            
            <button class="btn-gray full" onclick="hideDeleteOptions()" style="margin-top: 5px;">Abbrechen</button>
        </div>
    </div>
</div>

<div id="m-backup" class="modal">
    <div class="m-box" style="padding: 20px; border-radius: 16px; background: #1e1e1e; box-shadow: 0 8px 32px rgba(0,0,0,0.5);">
        <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; color: #ffffff; text-align: center;">Tools</h3>
        
        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Bestehender Code</label>
        <textarea id="b-export" readonly style="width: 100%; height: 60px; font-size: 0.8rem; color: #ccc; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 12px; font-family: monospace;"></textarea>
        
        <div class="btn-grid" style="margin-bottom: 20px;">
            <button class="btn-gray full" onclick="copyB()">Code kopieren</button>
            <button class="btn-gray" onclick="downloadB()">Download</button>
            <button class="btn-red" onclick="clearAllData()">Löschen</button>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Wiederherstellen</label>
        <textarea id="b-import" style="width: 100%; height: 60px; font-size: 0.8rem; color: #ffffff; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 12px;" placeholder="Code einfügen, danach importieren."></textarea>
        
        <div class="btn-grid" style="margin-bottom: 20px;">
            <button class="btn-green full" onclick="importB()">Importieren</button>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <label style="font-size: 0.85rem; font-weight: 600; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Erscheinungsbild</label>
        
        <select id="theme-select" onchange="changeTheme(this.value)" style="width: 100%; height: 44px; margin-bottom: 25px; font-size: 16px; background: #2a2a2a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 0 12px; -webkit-appearance: none; appearance: none; cursor: pointer;">
            <option value="green">Grün</option>
            <option value="blue">Blau</option>
            <option value="red">Rot</option>
            <option value="gray">Grau</option>
            <option value="yellow">Gelb</option>
            <option value="orange">Orange</option>
            <option value="pink">Pink</option>
            <option value="purple">Lila</option>
            <option value="turquoise">Türkis</option>
            <option value="bw">Schwarzweiß</option>
        </select>

        <div class="btn-grid">
            <button class="btn-gray full" onclick="closePop()">Schließen</button>
        </div>
    </div>
</div>
<script>
    const STORAGE_KEY = 'inf_v47';
    const EX_KEY = 'inf_v47_ex';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let exceptions = JSON.parse(localStorage.getItem(EX_KEY)) || []; 
    let curId = null, curSelectedDate = null, loaded = [], renderedDays = [];
    const scroller = document.getElementById('scroller');

    document.getElementById('toggle-trigger').onclick = function(e) {
        const cb = document.getElementById('m-all');
        if (e.target !== cb) cb.checked = !cb.checked;
        toggleT();
    };

    function getDS(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

    function init() {
        const now = new Date();
        for(let i = -2; i <= 15; i++) renderMonth(now.getFullYear(), now.getMonth() + i);
        setTimeout(jumpToday, 100);
    }

    function renderMonth(y, m) {
    const first = new Date(y, m, 1);
    const k = first.getFullYear() + '-' + String(first.getMonth() + 1).padStart(2, '0');
    if(loaded.includes(k)) return;
    loaded.push(k);

    // Minimalistisches CSS für weißen Text mit schwarzem Umriss
    if (!document.getElementById('kw-separator-style')) {
        const style = document.createElement('style');
        style.id = 'kw-separator-style';
        style.innerHTML = `
            .week-separator {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .kw-label {
                position: absolute;
                font-size: 0.8rem;
                font-weight: bold;
                letter-spacing: 1.5px;
                
                /* Text ist immer strahlend weiß */
                color: #ffffff !important;
                
                /* Kein Hintergrund, komplett nackt */
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0;
                
                /* Der Text-Schatten-Trick für einen perfekten, rundherum geschlossenen schwarzen Rahmen */
                text-shadow: 
                    -1px -1px 0 #000,  
                     1px -1px 0 #000,
                    -1px  1px 0 #000,
                     1px  1px 0 #000,
                     0px -1px 0 #000,
                     0px  1px 0 #000,
                    -1px  0px 0 #000,
                     1px  0px 0 #000;
                
                z-index: 10;
                transform: translateY(-50%);
                top: 50%;
            }
        `;
        document.head.appendChild(style);
    }

    // Hilfsfunktion zur exakten Berechnung der KW (ISO-8601)
    function getWeekNumber(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.innerHTML = `<div class="month-rail"><div class="sticky-wrapper"><div class="month-label">${first.toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</div></div></div><div class="days-container" id="days-${k}"></div>`;
    scroller.appendChild(sec);

    const container = document.getElementById(`days-${k}`);
    let r = new Date(first);

    while(r.getMonth() === first.getMonth()) {
        if (r.getDay() === 1) {
            const sep = document.createElement('div');
            sep.className = 'week-separator';
            
            const kw = getWeekNumber(r);
            sep.innerHTML = `<div class="kw-label">KW ${kw}</div>`;
            
            container.appendChild(sep);
        }
        const ds = getDS(r);
        const isToday = ds === getDS(new Date());
        const isWE = (r.getDay() === 0 || r.getDay() === 6);
        
        const row = document.createElement('div');
        row.className = 'day-row' + (isToday ? ' today' : '') + (isWE ? ' we' : '');
        row.id = `d-${ds}`;
        row.onclick = () => openAdd(ds);
        
        row.innerHTML = `
            <div class="date-col">
                <span class="date-number">${r.getDate()}.</span>
                <span class="date-day">${r.toLocaleDateString('de-DE',{weekday:'short'})}</span>
            </div>
            <div class="event-col" id="e-${ds}"></div>
        `;
        container.appendChild(row);
        renderedDays.push({ds, date: new Date(r)});
        drawEvents(ds, r);
        r.setDate(r.getDate() + 1);
    }
}

    function drawEvents(ds, r) {
        const target = document.getElementById(`e-${ds}`);
        if(!target) return;
        target.innerHTML = '';
        db.forEach(e => {
            if(exceptions.includes(e.id + '_' + ds)) return;
            let show = false, rel = "full"; 
            const sO = new Date(e.startDate), eO = new Date(e.endDate);
            const dur = Math.round((eO - sO) / (1000 * 60 * 60 * 24));
            if (e.rep === 'none') {
                if (ds >= e.startDate && ds <= e.endDate) {
                    show = true;
                    if (ds === e.startDate && ds === e.endDate) rel = "full";
                    else if (ds === e.startDate) rel = "start";
                    else if (ds === e.endDate) rel = "end";
                    else rel = "middle";
                }
            } else if (ds >= e.startDate) {
                let a = new Date(sO);
                while (getDS(a) <= ds) {
                    let wS = getDS(a), wE_o = new Date(a); wE_o.setDate(wE_o.getDate() + dur);
                    let wE = getDS(wE_o);
                    if (ds >= wS && ds <= wE) { 
                        show = true; 
                        if (ds === wS && ds === wE) rel = "full";
                        else if (ds === wS) rel = "start";
                        else if (ds === wE) rel = "end";
                        else rel = "middle";
                        break; 
                    }
                    if (e.rep === 'täglich') a.setDate(a.getDate() + 1);
                    else if (e.rep === 'wöchentlich') a.setDate(a.getDate() + 7);
                    else if (e.rep === 'monatlich') a.setMonth(a.getMonth() + 1);
                    else if (e.rep === 'jährlich') a.setFullYear(a.getFullYear() + 1);
                    else break;
                }
            }
            if(show) {
                const div = document.createElement('div');
                div.className = 'event-item';
                let t = '';
                if (!e.all) {
                    if (rel === "full") t = `${e.startTime} `;
                    else if (rel === "start") t = `${e.startTime} `;
                    else if (rel === "end") t = `bis ${e.endTime} `;
                }
                div.innerText = t + e.title;
                div.onclick = (x) => { x.stopPropagation(); openEdit(e, ds); };
                target.appendChild(div);
            }
        });
    }

    function openAdd(ds) {
        curId = null; curSelectedDate = ds;
        document.getElementById('m-title').innerText = "Termin";
        document.getElementById('m-text').value = '';
        document.getElementById('m-start-date').value = ds;
        document.getElementById('m-end-date').value = ds;
        document.getElementById('m-time-start').value = "09:00";
        document.getElementById('m-time-end').value = "10:00";
        document.getElementById('m-all').checked = true; toggleT();
        document.getElementById('m-del').style.display = 'none';
        document.getElementById('m-event').style.display = 'flex';
    }

    function openEdit(e, ds) {
        curId = e.id; curSelectedDate = ds;
        document.getElementById('m-text').value = e.title;
        document.getElementById('m-start-date').value = e.startDate;
        document.getElementById('m-end-date').value = e.endDate;
        document.getElementById('m-time-start').value = e.startTime || "09:00";
        document.getElementById('m-time-end').value = e.endTime || "10:00";
        document.getElementById('m-rep').value = e.rep;
        document.getElementById('m-all').checked = e.all; toggleT();
        document.getElementById('m-del').style.display = 'block';
        document.getElementById('m-event').style.display = 'flex';
    }

    function save() {
        const title = document.getElementById('m-text').value; if(!title) return;
        const start = document.getElementById('m-start-date').value;
        let end = document.getElementById('m-end-date').value; if(end < start) end = start;
        const obj = { id: curId || Date.now(), title, startDate: start, endDate: end, all: document.getElementById('m-all').checked, startTime: document.getElementById('m-time-start').value, endTime: document.getElementById('m-time-end').value, rep: document.getElementById('m-rep').value };
        if(curId) db = db.map(i => i.id === curId ? obj : i); else db.push(obj);
        silentFinalize();
    }

    function silentFinalize() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        localStorage.setItem(EX_KEY, JSON.stringify(exceptions));
        renderedDays.forEach(item => drawEvents(item.ds, item.date));
        closePop();
    }

    function jumpToday() { const t = document.getElementById(`d-${getDS(new Date())}`); if(t) t.scrollIntoView({block:'center', behavior:'smooth'}); }
    function closePop() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function toggleT() { 
        const isA = document.getElementById('m-all').checked;
        document.getElementById('m-time-start-wrap').style.display = isA ? 'none' : 'block';
        document.getElementById('m-time-end-wrap').style.display = isA ? 'none' : 'block';
    }

function openBackup() { 
        try {
            // ==========================================
            // ALTE TERMINE & ALTE AUSNAHMEN LÖSCHEN
            // ==========================================
            // Berechne das Datum von vor genau einem Monat
            const einMonatAgo = new Date();
            einMonatAgo.setMonth(einMonatAgo.getMonth() - 1);

            // 1. Einmalige alte Termine aus der DB löschen
            if (Array.isArray(db)) {
                db = db.filter(item => {
                    if (item.rep && item.rep !== "none") return true; // Serien behalten
                    if (!item.startDate) return true; 
                    
                    const eventDatum = new Date(item.startDate);
                    return eventDatum >= einMonatAgo;
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            }

            // 2. Alte, abgelaufene Ausnahmen (gelöschte Serientermine) löschen
            if (Array.isArray(exceptions)) {
                exceptions = exceptions.filter(exString => {
                    // Splittet den Eintrag beim Unterstrich (z.B. "ID_2026-05-22" -> "2026-05-22")
                    const teile = exString.split('_');
                    if (teile.length < 2) return true; // Zur Sicherheit behalten, falls das Format abweicht
                    
                    const exDatum = new Date(teile[1]);
                    // Behalte die Ausnahme nur, wenn das Lösch-Datum nicht älter als ein Monat ist
                    return exDatum >= einMonatAgo;
                });
                // Die bereinigten Ausnahmen im LocalStorage speichern (Nutzt deine EX_KEY Variable)
                localStorage.setItem(EX_KEY, JSON.stringify(exceptions));
            }
            // ==========================================

            // Ab hier läuft dein normales, verschlüsseltes Backup weiter
            const rawData = JSON.stringify({db, exceptions});
            const verschluesselt = btoa(encodeURIComponent(rawData).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
            
            document.getElementById('b-export').value = verschluesselt; 
            document.getElementById('b-import').value = "";
            document.getElementById('m-backup').style.display = 'flex'; 
        } catch(e) {
            alert("Fehler beim Öffnen des Backups.");
        }
    }

    function copyB() { const el = document.getElementById('b-export'); el.select(); navigator.clipboard.writeText(el.value); alert("Kopiert!"); }

    function importB() { 
        const text = document.getElementById('b-import').value.trim();
        if(!text) return;
        if(!confirm("Alles überschreiben?")) return;
        try {
            // Entschlüsselt den Salat wieder zurück
            const klarText = decodeURIComponent(atob(text).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const data = JSON.parse(klarText); 
            if(data.db) {
                localStorage.clear();
                // Hier nutzen wir deine Original-Variablen
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data.db));
                localStorage.setItem(EX_KEY, JSON.stringify(data.exceptions || []));
                location.reload();
            }
        } catch(e) { 
            alert("Fehler! Das ist kein gültiges oder ein beschädigtes Backup."); 
        }
    }

    function downloadB() { 
        try {
            const rawData = JSON.stringify({db, exceptions});
            
            // Text unlesbar machen
            const verschluesselterText = btoa(encodeURIComponent(rawData).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
            
            // Wichtig: Wir nehmen 'text/plain', das blockiert kein Browser
            const blob = new Blob([verschluesselterText], {type: 'text/plain'}); 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(blob); 
            a.download = 'kalender_backup.txt'; 
            
            // Dieser Teil zwingt iOS/Safari dazu, die Datei wirklich zu speichern
            document.body.appendChild(a);
            a.click(); 
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            }, 100);
        } catch(e) {
            alert("Fehler beim Download.");
        }
    }

    function clearAllData() { if(confirm("Alles löschen?")) { localStorage.clear(); location.reload(); } }
    function showDeleteOptions() { if(document.getElementById('m-rep').value !== 'none') document.getElementById('m-del-confirm').style.display = 'flex'; else delSerie(); }
    function hideDeleteOptions() { document.getElementById('m-del-confirm').style.display = 'none'; }
    function delSerie() { db = db.filter(i => i.id !== curId); silentFinalize(); }
    function delSingle() { exceptions.push(curId + '_' + curSelectedDate); silentFinalize(); }

    scroller.onscroll = () => { if(scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - 800) { const l = loaded[loaded.length-1].split('-'); renderMonth(parseInt(l[0]), parseInt(l[1])); }};
    init();


function changeTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('inf_theme', theme);
}

// Beim Start das gespeicherte Thema laden
(function() {
    const savedTheme = localStorage.getItem('inf_theme') || 'green';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const select = document.getElementById('theme-select');
    if(select) select.value = savedTheme;
})();

// Verhindert das Zoomen durch Doppeltippen und Finger-Spreizen auf dem iPhone
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});


// ==========================================
// SUCHFUNKTION FÜR DEINE EVENT-DATENBANK
// ==========================================

// 1. Öffnet das Suchfenster
function openSearch() {
    document.getElementById('s-input').value = "";
    document.getElementById('s-results').innerHTML = "<p style='color:gray; font-size:14px;'>...</p>";
    document.getElementById('m-search').style.display = 'flex';
    document.getElementById('s-input').focus();
}

// 2. Durchsucht die Termine live beim Tippen
function runSearch() {
    const query = document.getElementById('s-input').value.toLowerCase().trim();
    const resultsContainer = document.getElementById('s-results');
    
    // Wenn das Feld leer ist, nichts anzeigen
    if (!query) {
        resultsContainer.innerHTML = "";
        return;
    }
    
    if (!Array.isArray(db)) return;
    
    // Filtert alle Termine, bei denen der Titel das Suchwort enthält
    const gefundeneEvents = db.filter(item => {
        return item.title && item.title.toLowerCase().includes(query);
    });
    
    // Wenn nichts gefunden wurde
    if (gefundeneEvents.length === 0) {
        resultsContainer.innerHTML = "<p style='color:red; font-size:14px;'>Keine Termine gefunden.</p>";
        return;
    }
    
    // Ergebnisse für den Bildschirm aufbereiten
    let html = "";
    gefundeneEvents.forEach(item => {
        // Formatiere das Datum ein bisschen schöner (aus 2026-05-16 wird 16.05.2026)
        let formatiertesDatum = item.startDate;
        if (item.startDate) {
            const teile = item.startDate.split('-');
            if (teile.length === 3) formatiertesDatum = `${teile[2]}.${teile[1]}.${teile[0]}`;
        }
        
        // Kennzeichnung für wiederkehrende Termine
        let wiederholung = "";
        if (item.rep && item.rep !== "none") {
            wiederholung = ` <span style='font-size:11px; color:green;'>(${item.rep})</span>`;
        }
        
        html += `
            <div style="padding:8px; border-bottom:1px solid #f0f0f0; font-size:14px;">
                <strong>${formatiertesDatum}</strong>: ${item.title}${wiederholung}
                ${item.startTime ? `<br><span style='color:gray; font-size:12px;'>Uhrzeit: ${item.startTime}</span>` : ''}
            </div>
        `;
    });
    
    resultsContainer.innerHTML = html;
}

</script>
