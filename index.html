.sticky-wrapper {

/* Nur aktiv, wenn das Handy quer liegt */
@media (orientation: landscape) {
    .month-rail {
        /* Erhöht die Breite der grauen Schiene um den Platz der Notch */
        width: calc(45px + env(safe-area-inset-left)) !important;
        /* Schiebt den Inhalt aus dem toten Winkel der Notch */
        padding-left: env(safe-area-inset-left) !important;
    }

    .sticky-wrapper {
        /* Zentriert den Monatsnamen wieder in der nun breiteren Schiene */
        display: flex;
        justify-content: center;
        width: 100%;
    }

    .days-container {
        /* Verhindert, dass die Zeilen rechts unter der Rundung verschwinden */
        padding-right: env(safe-area-inset-right) !important;
    }
}

/* Nur aktiv im Querformat */
@media (orientation: landscape) {
    .m-box {
        /* Nutzt fast die gesamte Höhe, lässt aber oben/unten 5% Platz */
        max-height: 90vh !important; 
        padding: 15px !important; /* Weniger Abstand innen */
        overflow-y: auto !important; /* Macht das Pop-up in sich scrollbar */
    }

    .m-box h3 {
        margin-bottom: 10px !important;
        font-size: 1.2rem !important; /* Titel etwas kleiner */
    }

    /* Macht die Eingabefelder im Querformat flacher */
    .m-box input[type="text"],
    .m-box input[type="date"],
    .m-box input[type="time"],
    .m-box select {
        height: 35px !important; 
        margin: 4px 0 !important;
    }

    /* Die Buttons rücken näher zusammen */
    .m-box button {
        margin-top: 10px !important;
        padding: 10px !important;
    }
}

/* 1. Verbietet das Markieren für absolut JEDES Element in der App */
*, *::before, *::after {
    -webkit-user-select: none;
    user-select: none;
}

/* 2. Erlaubt das Markieren NUR in Eingabefeldern, Textboxen und editierbaren Bereichen */
input, 
textarea, 
[contenteditable="true"] {
    -webkit-user-select: text !important;
    user-select: text !important;
}

<div id="app-preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); background-color: rgba(0, 0, 0, 0.35);">
    
    <style>
        .moon-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .moon-emoji {
            font-size: 2rem;
            opacity: 0;
            transform: scale(0.8);
        }

        /* Animationen für das nacheinander folgende Aufleuchten */
        .moon-1 { animation: moonFadeIn 0.6s cubic-bezier(0.1, 0.6, 0.2, 1) 0.5s forwards; }
        .moon-2 { animation: moonFadeIn 0.6s cubic-bezier(0.1, 0.6, 0.2, 1) 1.3s forwards; }
        .moon-3 { animation: moonFadeIn 0.6s cubic-bezier(0.1, 0.6, 0.2, 1) 2.1s forwards; }
        .moon-4 { animation: moonFadeIn 0.6s cubic-bezier(0.1, 0.6, 0.2, 1) 2.9s forwards; }

        @keyframes moonFadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.1); }
        }
    </style>

    <div class="moon-container">
        <span class="moon-emoji moon-1">🌑</span> <span class="moon-emoji moon-2">🌓</span> <span class="moon-emoji moon-3">🌕</span> <span class="moon-emoji moon-4">🌗</span> </div>

    <p id="preloader-text" style="color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.8px; margin: 0; text-align: center; max-width: 80%; line-height: 1.4;"></p>
    
    <script>
        var isEn = (navigator.language || navigator.userLanguage).startsWith('en');
        document.getElementById('preloader-text').innerText = isEn ? 'Calculating moon phases...' : 'Berechne Mondphasen...';

        window.addEventListener('load', function() {
            setTimeout(function() {
                var preloader = document.getElementById('app-preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    preloader.style.visibility = 'hidden';
                }
            }, 4000); 
        });
    </script>
</div>

<script>

    function applyFontSize(size) {

        if (size === 'small') {
            html.style.fontSize = "80%";

</div>
<script>
    const STORAGE_KEY = 'inf_v47';
    const EX_KEY = 'inf_v47_ex';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let exceptions = JSON.parse(localStorage.getItem(EX_KEY)) || []; 
    let curId = null, curSelectedDate = null, loaded = [], renderedDays = [];
    const scroller = document.getElementById('scroller');

    document.getElementById('toggle-trigger').onclick = function(e) {
        const cb = document.getElementById('m-all');
        if (e.target !== cb) cb.checked = !cb.checked;
        toggleT();
    };

    function getDS(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

    function init() {
        const now = new Date();
        for(let i = -2; i <= 15; i++) renderMonth(now.getFullYear(), now.getMonth() + i);
        setTimeout(jumpToday, 100);
    }

    function renderMonth(y, m) {
    const first = new Date(y, m, 1);
    const k = first.getFullYear() + '-' + String(first.getMonth() + 1).padStart(2, '0');
    if(loaded.includes(k)) return;
    loaded.push(k);

    // Minimalistisches CSS für weißen Text mit schwarzem Umriss
    if (!document.getElementById('w-separator-style')) {
        const style = document.createElement('style');
        style.id = 'w-separator-style';
        style.innerHTML = `
            .week-separator {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .w-label {
                position: absolute;
                font-size: 0.8rem;
                font-weight: bold;
                letter-spacing: 1.5px;
                
                /* Text ist immer strahlend weiß */
                color: #ffffff !important;
                
                /* Kein Hintergrund, komplett nackt */
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0;
                
                /* Der Text-Schatten-Trick für einen perfekten, rundherum geschlossenen schwarzen Rahmen */
                text-shadow: 
                    -1px -1px 0 #000,  
                     1px -1px 0 #000,
                    -1px  1px 0 #000,
                     1px  1px 0 #000,
                     0px -1px 0 #000,
                     0px  1px 0 #000,
                    -1px  0px 0 #000,
                     1px  0px 0 #000;
                
                z-index: 10;
                transform: translateY(-50%);
                top: 50%;
            }
        `;
        document.head.appendChild(style);
    }




    // Hilfsfunktion zur exakten Berechnung der W (ISO-8601)
    function getWeekNumber(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.innerHTML = `<div class="month-rail"><div class="sticky-wrapper"><div class="month-label">${first.toLocaleDateString('default',{month:'long',year:'numeric'})}</div></div></div><div class="days-container" id="days-${k}"></div>`;
    scroller.appendChild(sec);

    const container = document.getElementById(`days-${k}`);
    let r = new Date(first);

    while(r.getMonth() === first.getMonth()) {
        if (r.getDay() === 1) {
            const sep = document.createElement('div');
            sep.className = 'week-separator';
            
            const w = getWeekNumber(r);
            sep.innerHTML = `<div class="w-label">W ${w}</div>`;
            
            container.appendChild(sep);
        }
        const ds = getDS(r);
        const isToday = ds === getDS(new Date());
        const isWE = (r.getDay() === 0 || r.getDay() === 6);
        
        const row = document.createElement('div');
        row.className = 'day-row' + (isToday ? ' today' : '') + (isWE ? ' we' : '');
        row.id = `d-${ds}`;
        row.onclick = () => openAdd(ds);
        
        row.innerHTML = `
            <div class="date-col">
                <span class="date-number">${r.getDate()}.</span>
                <span class="date-day">${r.toLocaleDateString('default',{weekday:'short'})}</span>
            </div>
            <div class="event-col" id="e-${ds}"></div>
        `;
        container.appendChild(row);
        renderedDays.push({ds, date: new Date(r)});
        drawEvents(ds, r);
        r.setDate(r.getDate() + 1);
    }
}

    function drawEvents(ds, r) {
        const target = document.getElementById(`e-${ds}`);
        if(!target) return;
        target.innerHTML = '';
        db.forEach(e => {
            if(exceptions.includes(e.id + '_' + ds)) return;
            let show = false, rel = "full"; 
            const sO = new Date(e.startDate), eO = new Date(e.endDate);
            const dur = Math.round((eO - sO) / (1000 * 60 * 60 * 24));
            if (e.rep === 'none') {
                if (ds >= e.startDate && ds <= e.endDate) {
                    show = true;
                    if (ds === e.startDate && ds === e.endDate) rel = "full";
                    else if (ds === e.startDate) rel = "start";
                    else if (ds === e.endDate) rel = "end";
                    else rel = "middle";
                }
            } else if (ds >= e.startDate) {
                let a = new Date(sO);
                while (getDS(a) <= ds) {
                    let wS = getDS(a), wE_o = new Date(a); wE_o.setDate(wE_o.getDate() + dur);
                    let wE = getDS(wE_o);
                    if (ds >= wS && ds <= wE) { 
                        show = true; 
                        if (ds === wS && ds === wE) rel = "full";
                        else if (ds === wS) rel = "start";
                        else if (ds === wE) rel = "end";
                        else rel = "middle";
                        break; 
                    }
                    if (e.rep === 'd') a.setDate(a.getDate() + 1);
                    else if (e.rep === 'w') a.setDate(a.getDate() + 7);
                    else if (e.rep === 'm') a.setMonth(a.getMonth() + 1);
                    else if (e.rep === 'y') a.setFullYear(a.getFullYear() + 1);
                    else break;
                }
            }
            if(show) {
                const div = document.createElement('div');
                div.className = 'event-item';
                let t = '';
                if (!e.all) {
                    if (rel === "full") t = `${e.startTime} `;
                    else if (rel === "start") t = `${e.startTime} `;
                    else if (rel === "end") t = `bis ${e.endTime} `;
                }
                div.innerText = t + e.title;
                div.onclick = (x) => { x.stopPropagation(); openEdit(e, ds); };
                target.appendChild(div);
            }
        });
    }

    function openAdd(ds) {
        curId = null; curSelectedDate = ds;
        document.getElementById('m-title').innerText = "Event";
        document.getElementById('m-text').value = '';
        document.getElementById('m-start-date').value = ds;
        document.getElementById('m-end-date').value = ds;
        document.getElementById('m-time-start').value = "09:00";
        document.getElementById('m-time-end').value = "10:00";
        document.getElementById('m-all').checked = true; toggleT();
        document.getElementById('m-del').style.display = 'none';
        document.getElementById('m-event').style.display = 'flex';
    }

    function openEdit(e, ds) {
        curId = e.id; curSelectedDate = ds;
        document.getElementById('m-text').value = e.title;
        document.getElementById('m-start-date').value = e.startDate;
        document.getElementById('m-end-date').value = e.endDate;
        document.getElementById('m-time-start').value = e.startTime || "09:00";
        document.getElementById('m-time-end').value = e.endTime || "10:00";
        document.getElementById('m-rep').value = e.rep;
        document.getElementById('m-all').checked = e.all; toggleT();
        document.getElementById('m-del').style.display = 'block';
        document.getElementById('m-event').style.display = 'flex';
    }

function save() {
        const title = document.getElementById('m-text').value; if(!title) return;
        const start = document.getElementById('m-start-date').value;
        let end = document.getElementById('m-end-date').value; if(end < start) end = start;
        const obj = { id: curId || Date.now(), title, startDate: start, endDate: end, all: document.getElementById('m-all').checked, startTime: document.getElementById('m-time-start').value, endTime: document.getElementById('m-time-end').value, rep: document.getElementById('m-rep').value };
        if(curId) db = db.map(i => i.id === curId ? obj : i); else db.push(obj);
        
// --- LOCAL NOTIFICATION MIT CAPACITOR (PERFEKT FÜR REINES JS) ---
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
            const LocalNotifications = window.Capacitor.Plugins.LocalNotifications;

            setTimeout(async () => {
                try {
                    // 1. Erstmalig nach Erlaubnis fragen (Apple-Popup triggern)
                    let perm = await LocalNotifications.checkPermissions();
                    if (perm.display !== 'granted') {
                        perm = await LocalNotifications.requestPermissions();
                    }

                    if (perm.display === 'granted') {
                        const timeStart = obj.all ? "09:00" : obj.startTime;
                        
                        // Datum splitten, um den Zeitzonen-Bug zu umgehen
                        const parts = obj.startDate.split('-'); 
                        const timeParts = timeStart.split(':'); 
                        
                        // Lokale Zeit berechnen
                        let notificationTime = new Date(parts[0], parts[1] - 1, parts[2], timeParts[0], timeParts[1]);
                        
                        // --- DYNAMISCHE MINUTEN ABZIEHEN (CRASH-SICHER) ---
                        let minutesBefore = 120; // Standard: 2 Stunden vorher
                        const menuElement = document.getElementById('reminderTime');
                        if (menuElement) {
                            minutesBefore = parseInt(menuElement.value) || 0;
                        }
                        
                        // Minuten vom Termin abziehen
                        notificationTime.setMinutes(notificationTime.getMinutes() - minutesBefore);
                        // --------------------------------------------------

                        // Sprache abfragen
                        const isEnglish = (navigator.language || navigator.userLanguage).startsWith('en');
                        const notificationTitle = isEnglish ? "Upcoming Event" : "Anstehender Termin";

                        // 2. Notification an iOS übergeben
                        await LocalNotifications.schedule({
                            notifications: [
                                {
                                    title: notificationTitle,
                                    body: obj.title,
                                    id: Math.floor(Math.random() * 100000), // Einzigartige ID für iOS
                                    schedule: { at: notificationTime },
                                    sound: 'default' // Schaltet den Standard-iOS-Ton ein
                                }
                            ]
                        });
                    }
                } catch (error) {
                    console.error("Fehler bei den Notifications:", error);
                }
            }, 1000);
        }
        // ---------------------------------------------------------------------------

        // Prozess lautlos abschließen (Wichtig, damit nichts schwarz bleibt!)
        silentFinalize();
    }

    function silentFinalize() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        localStorage.setItem(EX_KEY, JSON.stringify(exceptions));
        renderedDays.forEach(item => drawEvents(item.ds, item.date));
        closePop();
    }

    function jumpToday() { const t = document.getElementById(`d-${getDS(new Date())}`); if(t) t.scrollIntoView({block:'center', behavior:'smooth'}); }
    function closePop() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function toggleT() { 
        const isA = document.getElementById('m-all').checked;
        document.getElementById('m-time-start-wrap').style.display = isA ? 'none' : 'block';
        document.getElementById('m-time-end-wrap').style.display = isA ? 'none' : 'block';
    }

function renderMonth(y, m) {
    const first = new Date(y, m, 1);
    const k = first.getFullYear() + '-' + String(first.getMonth() + 1).padStart(2, '0');
    if(loaded.includes(k)) return;
    loaded.push(k);

    // CSS für die W-Schilder und die saubere Ausrichtung der Emojis
    if (!document.getElementById('w-separator-style')) {
        const style = document.createElement('style');
        style.id = 'w-separator-style';
        style.innerHTML = `
            .week-separator {
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .w-label {
                position: absolute;
                font-size: 0.75rem;
                font-weight: bold;
                letter-spacing: 1.5px;
                color: #ffffff !important;
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0;
                text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px -1px 0 #000, 0px 1px 0 #000, -1px 0px 0 #000, 1px 0px 0 #000;
                z-index: 10;
                transform: translateY(-50%);
                top: 50%;
            }
            .day-row {
                display: flex;
                align-items: center;
            }
            .event-col {
                flex: 1;
            }
            /* Perfekter Platzhalter für die Mond-Emojis ganz rechts */
            .moon-col {
                font-size: 0.95rem; /* Optimale Emoji-Größe */
                padding-right: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                min-width: 24px;
                cursor: default;
                user-select: none;
            }
        `;
        document.head.appendChild(style);
    }

    // Hilfsfunktion zur exakten Berechnung der W (ISO-8601)
    function getWeekNumber(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    // Hilfsfunktion für die exakten Emoji-Mondphasen
    function getMoonPhaseIcon(date) {
        const lp = 2551443; 
        const now = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0);
        const newMoon = new Date(1970, 0, 7, 20, 35, 0);
        let phase = ((now.getTime() - newMoon.getTime()) / 1000) % lp;
        if (phase < 0) phase += lp;
        const days = phase / (24 * 3600);
        
        // Präzise getaktet auf einen Tag Toleranz
        if (days >= 29.0 || days < 0.5) return '🌑'; // Neumond
        if (days >= 6.9 && days < 7.9) return '🌓';   // Zunehmender Halbmond
        if (days >= 14.3 && days < 15.3) return '🌕'; // Vollmond
        if (days >= 21.6 && days < 22.6) return '🌗'; // Abnehmender Halbmond
        return ''; 
    }

    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.innerHTML = `<div class="month-rail"><div class="sticky-wrapper"><div class="month-label">${first.toLocaleDateString('default',{month:'long',year:'numeric'})}</div></div></div><div class="days-container" id="days-${k}"></div>`;
    scroller.appendChild(sec);

    const container = document.getElementById(`days-${k}`);
    let r = new Date(first);

    while(r.getMonth() === first.getMonth()) {
        if (r.getDay() === 1) {
            const sep = document.createElement('div');
            sep.className = 'week-separator';
            const w = getWeekNumber(r);
            sep.innerHTML = `<div class="w-label">W ${w}</div>`;
            container.appendChild(sep);
        }
        const ds = getDS(r);
        const isToday = ds === getDS(new Date());
        const isWE = (r.getDay() === 0 || r.getDay() === 6);
        
        const row = document.createElement('div');
        row.className = 'day-row' + (isToday ? ' today' : '') + (isWE ? ' we' : '');
        row.id = `d-${ds}`;
        row.onclick = () => openAdd(ds);
        
        const moonSymbol = getMoonPhaseIcon(r);
        
        row.innerHTML = `
            <div class="date-col">
                <span class="date-number">${r.getDate()}.</span>
                <span class="date-day">${r.toLocaleDateString('default',{weekday:'short'})}</span>
            </div>
            <div class="event-col" id="e-${ds}"></div>
            <div class="moon-col">${moonSymbol}</div>
        `;
        container.appendChild(row);
        
        renderedDays.push({ds, date: new Date(r)});
        drawEvents(ds, r);
        r.setDate(r.getDate() + 1);
    }
}

function openBackup() { 
        try {
            // ==========================================
            // ALTE TERMINE & ALTE AUSNAHMEN LÖSCHEN
            // ==========================================
            // Berechne das Datum von vor genau einem Monat
            const einMonatAgo = new Date();
            einMonatAgo.setMonth(einMonatAgo.getMonth() - 1);

            // 1. Einmalige alte Termine aus der DB löschen
            if (Array.isArray(db)) {
                db = db.filter(item => {
                    if (item.rep && item.rep !== "none") return true; // Serien behalten
                    if (!item.startDate) return true; 
                    
                    const eventDatum = new Date(item.startDate);
                    return eventDatum >= einMonatAgo;
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            }

            // 2. Alte, abgelaufene Ausnahmen (gelöschte Serientermine) löschen
            if (Array.isArray(exceptions)) {
                exceptions = exceptions.filter(exString => {
                    // Splittet den Eintrag beim Unterstrich (z.B. "ID_2026-05-22" -> "2026-05-22")
                    const teile = exString.split('_');
                    if (teile.length < 2) return true; // Zur Sicherheit behalten, falls das Format abweicht
                    
                    const exDatum = new Date(teile[1]);
                    // Behalte die Ausnahme nur, wenn das Lösch-Datum nicht älter als ein Monat ist
                    return exDatum >= einMonatAgo;
                });
                // Die bereinigten Ausnahmen im LocalStorage speichern (Nutzt deine EX_KEY Variable)
                localStorage.setItem(EX_KEY, JSON.stringify(exceptions));
            }
            // ==========================================

            // Ab hier läuft dein normales, verschlüsseltes Backup weiter
            const rawData = JSON.stringify({db, exceptions});
            const verschluesselt = btoa(encodeURIComponent(rawData).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
            
            document.getElementById('b-export').value = verschluesselt; 
            document.getElementById('b-import').value = "";
            document.getElementById('m-backup').style.display = 'flex'; 
        } catch(e) {
            alert("Fehler beim Öffnen des Backups.");
        }
    }

    function copyB() { const el = document.getElementById('b-export'); el.select(); navigator.clipboard.writeText(el.value); alert("Kopiert!"); }

    function importB() { 
        const text = document.getElementById('b-import').value.trim();
        if(!text) return;
        if(!confirm("Alles überschreiben?")) return;
        try {
            // Entschlüsselt den Salat wieder zurück
            const klarText = decodeURIComponent(atob(text).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const data = JSON.parse(klarText); 
            if(data.db) {
                localStorage.clear();
                // Hier nutzen wir deine Original-Variablen
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data.db));
                localStorage.setItem(EX_KEY, JSON.stringify(data.exceptions || []));
                location.reload();
            }
        } catch(e) { 
            alert("Fehler! Das ist kein gültiges oder ein beschädigtes Backup."); 
        }
    }

   function downloadB() { 
    try {
        const rawData = JSON.stringify({db, exceptions});
        
        // Text unlesbar machen (dein originaler Code)
        const verschluesselterText = btoa(encodeURIComponent(rawData).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
        
        // Prüfen, ob wir als App auf dem iPhone laufen
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            
            const Filesystem = window.Capacitor.Plugins.Filesystem;
            const Share = window.Capacitor.Plugins.Share;

            if (!Filesystem || !Share) {
                alert("Fehler: Die Capacitor-Plugins wurden nicht richtig geladen.");
                return;
            }

            // 1. Datei im Zwischenspeicher der App ablegen
            Filesystem.writeFile({
                path: 'kalender_backup.txt',
                data: verschluesselterText,
                directory: 'CACHE', // Nutzt den temporären Cache-Ordner auf iOS
                encoding: 'utf8'
            }).then(function(result) {
                // 2. Das native iOS-Teilen-Menü öffnen
                return Share.share({
                    title: 'Kalender Backup',
                    url: result.uri // Gibt den Pfad der Datei an iOS weiter
                });
            }).catch(function(err) {
                alert("Fehler beim Speichern auf iOS: " + err.message);
            });

        } else {
            // FALLBACK FÜR LAPTOP: Dein originaler, funktionierender Code
            const blob = new Blob([verschluesselterText], {type: 'text/plain'}); 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(blob); 
            a.download = 'kalender_backup.txt'; 
            
            document.body.appendChild(a);
            a.click(); 
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            }, 100);
        }
    } catch(e) {
        alert("Fehler beim Download: " + e.message);
    }
}

// --- AUTOMATISCHER BACKUP-REMINDER ALLE 2 WOCHEN (DEUTSCH & ENGLISCH) ---
if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
    const LocalNotifications = window.Capacitor.Plugins.LocalNotifications;

    setTimeout(async () => {
        try {
            // 1. Berechtigungen prüfen und ggf. anfragen
            let perm = await LocalNotifications.checkPermissions();
            if (perm.display !== 'granted') {
                perm = await LocalNotifications.requestPermissions();
            }

            // 2. Wenn der Nutzer zustimmt, den Reminder einrichten
            if (perm.display === 'granted') {
                
                // Startzeit berechnen: Heute in genau 14 Tagen um 18:00 Uhr abends
                let firstBackupTime = new Date();
                firstBackupTime.setDate(firstBackupTime.getDate() + 14);
                firstBackupTime.setHours(18, 0, 0, 0); 

                // Sprache abfragen
                const isEnglish = (navigator.language || navigator.userLanguage).startsWith('en');
                
                // Texte dynamisch setzen
                const reminderTitle = isEnglish ? "Backup Reminder" : "Backup-Erinnerung";
                const reminderBody = isEnglish 
                    ? "Secure your calendar data now via the Tools menu." 
                    : "Sichere deine Kalenderdaten jetzt über das Tools-Menü.";

                // Notification bei iOS registrieren
                await LocalNotifications.schedule({
                    notifications: [
                        {
                            title: reminderTitle,
                            body: reminderBody,
                            id: 99999,          // Feste ID verhindert doppelte Erinnerungen
                            sound: 'default',    // Macht alle 2 Wochen akustisch auf sich aufmerksam
                            schedule: { 
                                at: firstBackupTime,
                                every: 'two-weeks' // Wiederholt sich automatisch alle 14 Tage
                            }
                        }
                    ]
                });
                
                console.log(`Backup-Reminder auf ${isEnglish ? 'Englisch' : 'Deutsch'} eingerichtet.`);
            }
        } catch (error) {
            console.error("Fehler beim Einrichten des Backup-Reminders:", error);
        }
    }, 1000);
}

// 1. Öffnet das Suchfenster
function openSearch() {
    document.getElementById('s-input').value = "";
    document.getElementById('s-results').innerHTML = "<p style='color:gray; font-size:14px;'> </p>";
    document.getElementById('m-search').style.display = 'flex';
    document.getElementById('s-input').focus();
}

// 2. Durchsucht die Termine live beim Tippen
function runSearch() {
    const query = document.getElementById('s-input').value.toLowerCase().trim();
    const resultsContainer = document.getElementById('s-results');
    
    // Wenn das Feld leer ist, nichts anzeigen
    if (!query) {
        resultsContainer.innerHTML = "";
        return;
    }
    
    if (!Array.isArray(db)) return;
    
    // Filtert alle Termine, bei denen der Titel das Suchwort enthält
    const gefundeneEvents = db.filter(item => {
        return item.title && item.title.toLowerCase().includes(query);
    });
    
    // Wenn nichts gefunden wurde
    if (gefundeneEvents.length === 0) {
        resultsContainer.innerHTML = "<p style='color:red; font-size:14px;'></p>";
        return;
    }
    
    // Ergebnisse für den Bildschirm aufbereiten
    let html = "";
    gefundeneEvents.forEach(item => {
        // Formatiere das Datum ein bisschen schöner (aus 2026-05-16 wird 16.05.2026)
        let formatiertesDatum = item.startDate;
        if (item.startDate) {
            const teile = item.startDate.split('-');
            if (teile.length === 3) formatiertesDatum = `${teile[2]}.${teile[1]}.${teile[0]}`;
        }
        
        // Kennzeichnung für wiederkehrende Termine
        let wiederholung = "";
        if (item.rep && item.rep !== "none") {
            wiederholung = ` <span style='font-size:11px; color:green;'>(${item.rep})</span>`;
        }
        
        html += `
            <div style="padding:8px; border-bottom:1px solid #f0f0f0; font-size:14px;">
                <strong>${formatiertesDatum}</strong>: ${item.title}${wiederholung}
                ${item.startTime ? `<br><span style='color:gray; font-size:12px;'>${item.startTime}</span>` : ''}
            </div>
        `;
    });
    
    resultsContainer.innerHTML = html;
}
